{% extends 'base.html' %}
{% block content %}
<style>
    .custom-btn {
        background-color: #CCCCFF;
        color: white !important;
        border-radius: 8px;
        padding: 6px 18px;
        transition: all 0.3s ease;
        display: inline-block;
        text-decoration: none;
        border: none;
        font-weight: bold;
        cursor: pointer;
    }

    .custom-btn:hover {
        background-color: #B3B3FF;
        transform: translateY(-2px);
        box-shadow: 0 4px 10px rgba(204, 204, 255, 0.4);
    }

    /* 전체 폼 컨테이너 */
    .form-container {
        max-width: 950px;
        margin: 50px auto;
        padding: 30px;
        background-color: #ffffff;
        border: 1px solid #eeeeee;
        border-radius: 12px;
    }

    /* 가격 입력창 화살표 제거 */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }

    /* 레이아웃 분할 */
    .upload-main-layout {
        display: flex;
        gap: 40px;
    }

    .photo-section {
        flex: 1.2;
    }

    .info-section {
        flex: 1;
        border-left: 1px solid #eee;
        padding-left: 40px;
    }

    /* 업로드 영역 스타일 */
    .main-upload-area {
        width: 100%;
        aspect-ratio: 1/1;
        border: 2px dashed #CCCCFF;
        background-color: #f9f9ff;
        border-radius: 15px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        margin-bottom: 20px;
        transition: 0.3s;
    }

    .preview-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
    }

    .preview-item {
        position: relative;
        aspect-ratio: 1/1;
        border: 1px dashed #ccc;
        border-radius: 12px;
        overflow: hidden;
        background-color: #fafafa;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .preview-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .custom-input {
        background-color: #f0f0ff;
        border: none;
        border-radius: 10px;
        padding: 12px 15px;
        margin-bottom: 5px;
    }

    .custom-label {
        font-weight: bold;
        margin-bottom: 8px;
        display: block;
    }

    .btn-remove {
        position: absolute;
        top: 5px;
        right: 5px;
        background: rgba(0, 0, 0, 0.5);
        color: white;
        border: none;
        border-radius: 50%;
        width: 22px;
        height: 22px;
        cursor: pointer;
    }

    .empty-slot {
        color: #ccc;
        font-size: 20px;
    }
</style>

<main class="container">
    <div class="form-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold m-0">{{ '상품 수정하기' if product else '상품 등록하기' }}</h2>
            <a href="{{ url_for('main.index') }}" class="btn btn-danger" style="font-weight: bold;">취소</a>
        </div>

        <form
            action="{{ url_for('items.product_modify', item_id=product.id) if product else url_for('items.product_upload') }}"
            method="post" enctype="multipart/form-data">

            <div class="upload-main-layout">
                <div class="photo-section">
                    <p class="custom-label">사진 업로드</p>
                    <div class="main-upload-area" onclick="document.getElementById('images-input').click()">
                        <i class="fas fa-camera mb-2" style="font-size: 40px; color: #CCCCFF;"></i>
                        <span class="text-muted">사진 등록 (최대 10장)</span>
                        <input type="file" id="images-input" name="images" multiple accept="image/*"
                            style="display: none;">
                    </div>
                </div>

                <div class="info-section">
                    <div class="mb-4">
                        <label class="custom-label">상품명</label>
                        <input type="text" class="form-control custom-input" name="title" placeholder="상품명 입력"
                            value="{{ product.item_title if product else '' }}" required>
                    </div>

                    <div class="mb-4">
                        <label class="custom-label">카테고리 선택</label>
                        <select class="form-select custom-input" name="category">
                            <option selected disabled>카테고리 선택</option>
                            {% for cat in categories %}
                            <option value="{{ cat.id }}" {% if product and cat.id==product.category_id %}selected{%
                                endif %}>
                                {{ cat.category_name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="custom-label">가격</label>
                        <div class="input-group">
                            <input type="number" class="form-control custom-input" name="price" placeholder="가격 입력"
                                value="{{ product.item_price if product else '' }}">
                            <span class="input-group-text custom-input"
                                style="background: none; border-left: none;">원</span>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="custom-label">내용 입력</label>
                        <textarea class="form-control custom-input" name="content" rows="8"
                            placeholder="간단한 상품 설명을 입력해주세요">{{ product.item_description if product else '' }}</textarea>
                    </div>
                </div>
            </div>

            <div class="text-center mt-5">
                <button class="custom-btn" type="submit" style="border-radius: 15px;">상품 등록</button>
            </div>
        </form>
    </div>
</main>

{% endblock %}
