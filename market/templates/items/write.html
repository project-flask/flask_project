<!-- 상품 등록하기 페이지 -->

{% extends 'base.html' %}
{% block content %}
<style>

    .custom-btn {
            background-color: #CCCCFF;
            color: white !important;
            border-radius: 8px;
            padding: 6px 18px;
            transition: all 0.3s ease;
            display: inline-block;
            text-decoration:none;
            border: none;
            font-weight: bold;
        }

    .custom-btn:hover {
        background-color: #B3B3FF;
        transform: translateY(-2px);
        box-shadow: 0 4px 10px rgba(204, 204, 255, 0.4);
    }

    /* 전체 폼 컨테이너 */
    .form-container {
        max-width: 750px;
        margin: 60px auto;
        padding: 20px;
    }

    /* 가격 입력창 화살표(스피너) 제거 */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }
    input[type=number] {
        -moz-appearance: textfield; /* 파이어폭스용 */
    }

    /* 등록 버튼 스타일 */
    .upload-btn {
        background-color: #CCCCFF;
        color: white !important;
        border: none;
        padding: 12px 40px;
        border-radius: 8px;
        font-weight: bold;
        transition: all 0.3s ease;
    }

    .upload-btn:hover {
        background-color: #B3B3FF;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(204, 204, 255, 0.4);
    }

    /* 입력창 포커스 시 테두리 색상 변경 */
    .form-control:focus, .form-select:focus {
        border-color: #CCCCFF;
        outline: 0;
        box-shadow: 0 0 0 0.25rem rgba(204, 204, 255, 0.25);
    }
</style>

<main class="container">
    <div class="form-container">
        <h2 class="fw-bold mb-5 text-center">상품 등록하기</h2>

        <form action="#" method="post" enctype="multipart/form-data">


            <div class="d-flex justify-content-end">
                <a href="{{ url_for('main.index') }}" class="custom-btn mb-4">뒤로가기</a>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">사진 업로드</label>
                <input type="file" class="form-control" name="file" multiple>
                <div class="text-muted mb-2" style="font-size: 12px;">* 여러장 업로드 가능</div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">상품명</label>
                <input type="text" class="form-control" name="subject" placeholder="상품명 입력">
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">카테고리 선택</label>
                <select class="form-select" name="category">
                    <option selected disabled>카테고리</option>
                    <option value="디지털기기">디지털기기</option>
                    <option value="생활가전">생활가전</option>
                    <option value="가구/인테리어">가구/인테리어</option>
                    <option value="생활/주방">생활/주방</option>
                    <option value="유아동">유아동</option>
                    <option value="유아도서">유아도서</option>
                    <option value="여성의류">여성의류</option>
                    <option value="여성잡화">여성잡화</option>
                    <option value="남성패션/잡화">남성패션/잡화</option>
                    <option value="뷰티/미용">뷰티/미용</option>
                    <option value="스포츠/레저">스포츠/레저</option>
                    <option value="취미/게임/음반">취미/게임/음반</option>
                    <option value="도서">도서</option>
                    <option value="티켓/교환권">티켓/교환권</option>
                    <option value="e쿠폰">e쿠폰</option>
                    <option value="가공식품">가공식품</option>
                    <option value="건강기능식품">건강기능식품</option>
                    <option value="반려동물용품">반려동물용품</option>
                    <option value="식물">식물</option>
                    <option value="기타 중고물품">기타 중고물품</option>
                    <option value="삽니다">삽니다</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">가격</label>
                <div class="input-group">
                    <input type="number" class="form-control" name="price" placeholder="가격 입력">
                    <span class="input-group-text">원</span>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">내용 입력</label>
                <textarea class="form-control" name="content" rows="10" placeholder="간단한 상품 설명을 입력해주세요"></textarea>
            </div>

            <div class="text-center mt-5">
                <button type="submit" class="upload-btn">상품 등록</button>
            </div>
        </form>
    </div>
</main>
{% endblock %}
