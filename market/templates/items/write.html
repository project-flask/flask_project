{% extends 'base.html' %}
{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='style/write.css') }}">
{% endblock %}

{% block content %}

{% with messages = get_flashed_messages() %}
    {% if messages %}
        <input type="hidden" id="flask-message" value="{{ messages[0] }}">
    {% endif %}
{% endwith %}

<main class="container">
    <div class="form-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold m-0">{{ '상품 수정하기' if product else '상품 등록하기' }}</h2>
            <a href="{{ url_for('main.index') }}" class="btn btn-danger" style="font-weight: bold;">취소</a>
        </div>

        <form
            action="{{ url_for('items.product_modify', item_id=product.id) if product else url_for('items.product_upload') }}"
            method="post" enctype="multipart/form-data">

            <div class="upload-main-layout">
                <div class="photo-section">
                    <p class="custom-label">사진 업로드</p>
                    <div class="main-upload-area" onclick="document.getElementById('images-input').click()">
                        <i class="fas fa-camera mb-2" style="font-size: 40px; color: #CCCCFF;"></i>
                        <span class="text-muted">사진 등록 (최대 10장)</span>
                        <input type="file" id="images-input" name="images" multiple accept="image/*"
                            style="display: none;">
                    </div>
                    <div id="preview-container" class="preview-grid"></div>
                </div>

                <div class="info-section">
                    <div class="mb-4">
                        <label class="custom-label">상품명</label>
                        <input type="text" class="form-control custom-input" name="title" placeholder="상품명 입력"
                            value="{{ product.item_title if product else '' }}">
                        <div class="invalid-feedback-custom" id="error-title"></div>
                    </div>

                    <div class="mb-4">
                        <label class="custom-label">카테고리 선택</label>
                        <select class="form-select custom-input" name="category">
                            <option value="" selected disabled>카테고리 선택</option>
                            {% for cat in categories %}
                            <option value="{{ cat.id }}" {% if product and cat.id==product.category_id %}selected{% endif %}>
                                {{ cat.category_name }}
                            </option>
                            {% endfor %}
                        </select>
                        <div class="invalid-feedback-custom" id="error-category"></div>
                    </div>

                    <div class="mb-4">
                        <label class="custom-label">가격</label>
                        <div class="input-group">
                            <input type="number" class="form-control custom-input" name="price" placeholder="가격 입력"
                                value="{{ product.item_price if product else '' }}">
                            <span class="input-group-text custom-input"
                                style="background: none; border-left: none;">원</span>
                        </div>
                        <div class="invalid-feedback-custom" id="error-price"></div>
                    </div>

                    <div class="mb-4">
                        <label class="custom-label">내용 입력</label>
                        <textarea class="form-control custom-input" name="content" rows="8"
                            placeholder="간단한 상품 설명을 입력해주세요">{{ product.item_description if product else '' }}</textarea>
                        <div class="invalid-feedback-custom" id="error-content"></div>
                    </div>
                </div>
            </div>

            <div class="text-center mt-5">
                <button class="custom-btn" type="submit" style="border-radius: 15px;">상품 등록</button>
            </div>
        </form>
    </div>
</main>

{% endblock %}
