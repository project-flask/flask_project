{% extends 'base.html' %}
{% block content %}

<style>
/* 전체 배경 */
.password-wrapper {
    background-color: #fcfcff;
    min-height: 85vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}

/* 카드 */
.password-card {
    width: 100%;
    max-width: 480px;
    background: white;
    border-radius: 28px;
    box-shadow: 0 25px 50px rgba(204, 204, 255, 0.2);
    padding: 45px 35px;
}

/* 제목 */
.page-title {
    color: #444;
    letter-spacing: -1px;
}

/* 안내 문구 */
.info-text {
    color: #999;
    font-size: 0.9rem;
    margin-bottom: 25px;
    line-height: 1.5;
}

/* 입력창 */
.custom-input {
    border: 2px solid #f0f0ff !important;
    border-radius: 14px !important;
    padding: 13px 18px;
    background-color: #fcfcff;
    margin-bottom: 15px;
}

.custom-input:focus {
    border-color: #CCCCFF !important;
    background-color: white;
    box-shadow: 0 5px 15px rgba(204, 204, 255, 0.1);
    outline: none;
}

/* 버튼 */
.change-btn {
    background-color: #CCCCFF;
    color: white;
    border: none;
    border-radius: 14px;
    padding: 15px;
    font-weight: bold;
    width: 100%;
    margin-top: 10px;
    transition: all 0.3s ease;
}

.change-btn:hover {
    background-color: #B3B3FF;
    transform: translateY(-2px);
}

/* 메시지 */
.alert-box {
    margin-bottom: 16px;
    padding: 12px 14px;
    border-radius: 14px;
    border: none;
    background-color: #eef2ff;
    color: #6c6cff;
    font-size: 0.9rem;
    font-weight: bold;
}

/* 하단 링크 */
.bottom-link {
    margin-top: 20px;
    font-size: 0.9rem;
}

.bottom-link a {
    color: #ababfa;
    text-decoration: none;
    font-weight: 500;
}

.bottom-link a:hover {
    text-decoration: underline;
}
</style>

<div class="password-wrapper">
    <div class="password-card text-center">

        <!-- 제목 -->
        <h2 class="fw-bold mb-3 page-title">비밀번호 변경</h2>

        <!-- 안내 -->
        <p class="info-text">
            현재 비밀번호와 새 비밀번호를 입력해 주세요.<br>
            안전한 계정 관리를 위해 주기적인 변경을 권장합니다.
        </p>

        <!-- flash 메시지 -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert-box">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <!-- 비밀번호 변경 폼 -->
        <form method="post">

            <!-- 현재 비밀번호 -->
            <input type="password" name="current_password"
                   class="form-control custom-input"
                   placeholder="현재 비밀번호">

            <!-- 새 비밀번호 -->
            <input type="password" name="new_password"
                   class="form-control custom-input"
                   placeholder="새 비밀번호">

            <!-- 새 비밀번호 확인 -->
            <input type="password" name="confirm_password"
                   class="form-control custom-input"
                   placeholder="새 비밀번호 확인">

            <!-- 변경 버튼 -->
            <button type="submit" class="change-btn">비밀번호 변경하기</button>
        </form>

        <!-- 하단 이동, 경로수정 4월16일-->
        <div class="bottom-link">
            <a href="{{ url_for('personal.edit_profile') }}">
                회원정보 수정으로 돌아가기
            </a>
        </div>

    </div>
</div>

{% endblock %}
