{% extends 'base.html' %}
{% block content %}

<style>
    body {
        background-color: #ffffff;
    }

    .container {
        max-width: 720px;
        margin-top: 40px;
        margin-bottom: 60px;
    }

    /* 카드 */
    .edit-card {
        background: #ffffff;
        border: 1px solid #f0f1f7;
        border-radius: 22px;
        padding: 32px;
        box-shadow: 0 10px 30px rgba(119, 119, 170, 0.08);
    }

    /* 제목 */
    .section-title {
        font-weight: 800;
        font-size: 22px;
        margin-bottom: 24px;
        color: #2d2d44;
    }

    /* 프로필 */
    .profile-box {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 28px;
    }

    .avatar-circle {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: linear-gradient(135deg, #8c7bff, #c6beff);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        color: white;
        font-weight: 800;
    }

    /* 입력폼 */
    .form-group {
        margin-bottom: 18px;
    }

    .form-label {
        font-weight: 600;
        margin-bottom: 6px;
        color: #4b4568;
        display: block;
    }

    .form-control {
        width: 100%;
        border-radius: 12px;
        border: 1px solid #ddd6ff;
        padding: 10px 12px;
        font-size: 14px;
    }

    .form-control:focus {
        border-color: #7c6ff6;
        box-shadow: 0 0 0 3px rgba(124, 111, 246, 0.1);
        outline: none;
    }

    /* 읽기전용 */
    .form-control[readonly] {
        background-color: #f8f8ff;
        color: #8a8aa3;
    }

    /* 비밀번호 변경 버튼 */
    .password-link-box {
        margin-top: 10px;
        padding: 16px 18px;
        border: 1px solid #ece8ff;
        border-radius: 14px;
        background-color: #faf9ff;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
    }

    .password-link-text {
        font-size: 14px;
        color: #6d688a;
    }

    .btn-password-link {
        background: transparent;
        color: #6f61f2;
        border: 1px solid #ddd6ff;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 700;
        transition: all 0.2s ease;
    }

    .btn-password-link:hover {
        background-color: #f4f2ff;
    }

    /* 버튼 */
    .button-row {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 28px;
    }

    .btn-cancel {
        background: #ffffff;
        color: #6f61f2;
        border: 1px solid #ddd6ff;
        border-radius: 14px;
        padding: 14px 20px;
        font-weight: 700;
        transition: 0.2s;
    }

    .btn-cancel:hover {
        background-color: #f4f2ff;
    }

    .btn-save {
        min-width: 140px;
        background: linear-gradient(90deg, #7c6ff6, #695cef);
        color: white;
        border: none;
        border-radius: 14px;
        padding: 14px 20px;
        font-weight: 700;
        transition: 0.2s;
    }

    .btn-save:hover {
        box-shadow: 0 12px 24px rgba(124, 111, 246, 0.25);
    }

    /* 저장 메시지 */
    .alert-box {
        margin-bottom: 20px;
        padding: 12px 14px;
        border-radius: 12px;
        background-color: #f4f2ff;
        border: 1px solid #ddd6ff;
        color: #5f52d9;
        font-size: 14px;
        font-weight: 600;
    }
</style>

<div class="container">
    <div class="edit-card">

        <h3 class="section-title">회원정보 수정</h3>
        <!-- 저장완료 메시지 -->
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="alert-box">
            {{ messages[0] }}
        </div>
        {% endif %}
        {% endwith %}

        <!-- 프로필, 맨 첫 글자가 공란일 경우 U가 출력되도록 수정 4월16일 -->
        <div class="profile-box">
            <div class="avatar-circle">
                {{ (user.nickname or "U")[0] | upper }}
            </div>
            <div>
                <strong>{{ user.nickname }}</strong><br>
                <small class="text-muted">프로필 이미지 변경은 추후 지원 예정</small>
            </div>
        </div>

        <form method="post">
            <!-- 기본 정보 -->
            <div class="form-group">
                <label class="form-label">아이디</label>
                <input type="text" class="form-control" value="{{ user.login_id }}" readonly>
            </div>

            <div class="form-group">
                <label class="form-label">이름</label>
                <input type="text" class="form-control" value="{{ user.username }}" readonly>
            </div>
            <!--닉네임칸 생성 4월16일-->
            <div class="form-group">
                <label class="form-label">닉네임</label>
                <input type="text" name="nickname" class="form-control" value="{{ user.nickname }}"
                    maxlength="10" placeholder="닉네임 입력 (최대 10자까지)">
            </div>

            <div class="form-group">
                <label class="form-label">이메일</label>
                <input type="email" name="email" class="form-control" value="{{ user.email or '' }}"
                    placeholder="이메일 입력">
            </div>

            <div class="form-group">
                <label class="form-label">전화번호</label>
                <input type="text" name="phone" class="form-control" value="{{ user.phone or '' }}"
                    placeholder="전화번호 입력">
            </div>

            <!-- 비밀번호 변경 이동, 경로 수정 4월16일-->
            <div class="password-link-box">
                <span class="password-link-text">비밀번호를 변경하시겠어요?</span>
                <button type="button" class="btn-password-link"
                    onclick="location.href='{{ url_for('personal.change_password') }}'">
                    비밀번호 변경
                </button>
            </div>

            <!-- 저장 버튼, 경로 수정 4월16일 -->
            <div class="button-row">

                <button type="submit" class="btn-cancel" name="action" value="cancel">취소</button>
                <button type="submit" class="btn-save" name="action" value="save">저장하기</button>

                <button type="button" class="btn-cancel"
                    onclick="location.href='{{ url_for('personal.my_page') }}'">취소</button>
                <button type="submit" class="btn-save">저장하기</button>

            </div>
        </form>

    </div>
</div>

{% endblock %}
