{% extends 'base.html' %}
{% block content %}
<div class="container">
    <h3>❤️ 나의 찜 목록</h3>
    <div class="row">
        {% for wish in wishes %}
        <div class="col-md-4 mb-3">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">{{ wish.item.item_title }}</h5>
                    <p class="card-text text-danger">{{ wish.item.item_price }}원</p>
                    <a href="#" class="btn btn-primary btn-sm">상세보기</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
