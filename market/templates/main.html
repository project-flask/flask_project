<!-- 메인 페이지 -->

{% extends 'base.html' %}
{% block content %}

    <style>
        .custom-btn {
            background-color: #CCCCFF;
            color: white !important;
            border-radius: 8px;
            padding: 6px 18px;
            transition: all 0.3s ease;
            display: inline-block;
            text-decoration:none;
            border: none;
            font-weight: bold;
        }

        .custom-btn:hover {
            background-color: #B3B3FF;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(204, 204, 255, 0.4);
        }

        .main-container {
            margin-top: 50px;
            padding: 40px 0;
        }

        .product-card {
            border: 1px solid #eee;
            border-radius: 12px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            background-color: white;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-8px); /* 위로 슥 올라가게 */
            box-shadow: 0 10px 20px rgba(204, 204, 255, 0.3); /* 보라색 느낌의 그림자 */
            border-color: #CCCCFF; /* 테두리도 살짝 보라색으로 */
        }

        .product-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #f8f9fa;
            object-fit: cover;
            border-radius: 12px 12px 0 0;
        }

        .filter-link {
            text-decoration: none;
            color: #999;
            font-size: 12rem;
            transition: color 0.2s;
        }

        .filter-link:hover {
            color: #CCCCFF;
            text-decoration: underline;
        }

        .category-link {
            display: block;
            padding: 8px 0;
            color: #666;
            text-decoration: none;
        }

        .category-link:hover { color: #CCCCFF; }
    </style>

    <main class="container main-container">
        <div class="row">
	        <!--   사이드 메뉴, 필터, 카테고리     -->
            <aside class="col-md-2">
                <div style="margin-bottom: 20px;">
                    <h6 class="fw-bold mb-3">필터</h6>
                    <a href="{{ url_for('items.product_statuses', item_status_id=1) }}" class="category-link">
                        거래 가능만 보기
                    </a>
                </div>

                <!-- 카테고리 별 번호 부여 -->
                <div>
                    <h6 class="fw-bold mb-3">카테고리</h6>
                    {% for cat in all_categories %}
                    <a href="{{ url_for('items.product_categories', category_id=cat.id) }}" class="category-link">
                        {{ cat.category_name }}
                    </a>
                    {% endfor %}
                </div>
            </aside>

	        <!-- 상품 등록하기 버튼  -->
            <div class="col-md-10">
                <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                    <h3 class="fw-bold mb-4 d-flex justify-content-start">
                        전체 상품
                    </h3>
                <div class="d-flex justify-content-end">
                    <!-- product_upload -> items/write.html -->
                    <a href="{{ url_for('items.product_upload') }}" class="custom-btn">상품 등록하기</a>
                </div>
                </div>

		        <!--    상품 출력될 페이지    -->
                <div class="row">
                    {% for product in product_list %}
                    <div class="col-md-3 col-6">
                        <a href="{{ url_for('items.product_details', item_id=product.id) }}" class="text-decoration-none text-dark">
                            <div class="product-card">

                                <img src="{{ product.images[0].image_url if product.images else url_for('static', filename='img/default.png') }}"
                                     class="product-img"
                                     alt="{{ product.item_title }}">

                                <div class="product-info p-2 text-center">
                                    <div class="fw-bold text-truncate">{{ product.item_title }}</div>

                                    <div class="text-muted">{{ "{:,}원".format(product.item_price) }}</div>
                                </div>
                            </div>
                        </a>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </main>
{% endblock %}
