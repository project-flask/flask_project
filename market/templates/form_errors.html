<!--로그인/비번 찾기용(플래시 메시지 스타일 보라색으로 변경)-->
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}

      {% if category == 'success' %}
        <div class="alert mb-4 text-center"
             style="border-radius: 14px; border: none; font-size: 0.9rem; font-weight: bold;
                    background-color: #eef2ff; color: #6c6cff; padding: 15px;
                    box-shadow: 0 4px 10px rgba(108, 108, 255, 0.05);">
            {{ message | safe }}
        </div>
      {% else %}
        <div class="alert alert-danger" role="alert">
            {{ message }}
        </div>
      {% endif %}

    {% endfor %}
  {% endif %}
{% endwith %}
